title: Watching the AI boom in 150 billion PyPI downloads
agents: [claude]   # coding-agent guides to keep in sync via `dashdown skill`

llm:
  provider: mistral
  model: mistral-medium-latest
  api_key: ${MISTRAL_API_KEY}   # build-time only — answers are baked into the static export

layout:
  width: m          # article measure — this is a long-scroll story, not a grid of tiles

sidebar:
  hidden: true      # article-style site — the two pages cross-link in the prose instead

branding:
  palette: ["#6366f1", "#f59e0b", "#10b981", "#ef4444", "#0ea5e9", "#a855f7", "#f97316", "#14b8a6"]
