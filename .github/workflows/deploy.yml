name: Build & deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dashdown (with the Mistral LLM provider)
        run: pip install 'dashdown-md[mistral]'

      - name: Build static site (bakes Ask/Explain answers)
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: dashdown build . --out dist

      - name: Fail if AI answers were not baked
        run: |
          if grep -rl '"notice"' dist/_dashdown/data/_ask/ >/dev/null 2>&1; then
            echo "::error::Some Ask answers are notice payloads — is the MISTRAL_API_KEY secret set?"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages (ai-boom.dashdown.ai)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 pages deploy dist \
            --project-name=ai-boom-dashdown --branch=main
